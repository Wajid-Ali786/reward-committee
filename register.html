<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reward Committee - Register</title>
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body>
    <header class="app-header">
      <nav class="app-nav">
        <div class="nav-left">
          <a href="index.html" class="logo">Reward Committee</a>
        </div>
        <div class="nav-right">
          <!-- Logged Out Section -->
          <div id="navLoggedOut">
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
          </div>

          <!-- Logged In Section -->
          <div id="navLoggedIn" style="display: none;">
            <div class="profile-wrapper">
              <button id="profileBtn" class="profile-icon" type="button">👤</button>

              <div id="profileDropdown" class="profile-dropdown" style="display: none;">
                <p id="navUserName"></p>
                <p id="navUserEmail"></p>
                <hr />
                <a href="dashboard.html">Dashboard</a>
                <button id="logoutBtn" type="button">Logout</button>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="app-main">
      <section class="auth-section">
        <h2>Register</h2>
        <div id="register-error" class="auth-error" aria-live="polite"></div>
        <form class="auth-form" id="register-form">
          <div class="form-field">
            <label for="register-name">Full Name</label>
            <input type="text" id="register-name" name="name" placeholder="Your name" />
          </div>
          <div class="form-field">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" name="email" placeholder="you@example.com" />
          </div>
          <div class="form-field">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" name="password" placeholder="Create a password" />
          </div>
          <button type="submit" class="btn-primary">Create Account</button>
        </form>
      </section>
    </main>

    <footer class="app-footer">
      <p>&copy; <span id="year-placeholder">2026</span> Reward Committee</p>
    </footer>

    <script type="module" src="assets/js/auth.js"></script>
    <script type="module">
      import { initAuthListener } from "./assets/js/auth.js";
      initAuthListener();
    </script>
  </body>
</html>
