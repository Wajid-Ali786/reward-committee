<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reward Committee - Login</title>
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body>
    <header class="app-header">
      <nav class="app-nav">
        <div class="nav-left">
          <a href="index.html" class="logo">Reward Committee</a>
        </div>
        <div class="nav-right">
          <!-- Logged Out Section -->
          <div id="navLoggedOut">
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
          </div>

          <!-- Logged In Section -->
          <div id="navLoggedIn" style="display: none;">
            <div class="profile-wrapper">
              <button id="profileBtn" class="profile-icon" type="button">👤</button>

              <div id="profileDropdown" class="profile-dropdown" style="display: none;">
                <p id="navUserName"></p>
                <p id="navUserEmail"></p>
                <hr />
                <a href="dashboard.html">Dashboard</a>
                <button id="logoutBtn" type="button">Logout</button>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="app-main">
      <section class="auth-section">
        <h2>Login</h2>
        <div id="login-error" class="auth-error" aria-live="polite"></div>
        <form class="auth-form" id="login-form">
          <div class="form-field">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" name="email" placeholder="you@example.com" />
          </div>
          <div class="form-field">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" placeholder="••••••••" />
          </div>
          <button type="submit" class="btn-primary">Login</button>
        </form>

        <div class="auth-extra">
          <button id="forgot-password-toggle" type="button" class="link-button">
            Forgot password?
          </button>

          <section
            id="reset-section"
            class="reset-section"
            aria-label="Password reset"
            hidden
          >
            <p>Enter your email and we’ll send you a reset link.</p>
            <div id="reset-message" class="auth-error" aria-live="polite"></div>
            <form id="reset-form" class="auth-form reset-form">
              <div class="form-field">
                <label for="reset-email">Email</label>
                <input
                  type="email"
                  id="reset-email"
                  name="reset-email"
                  placeholder="you@example.com"
                />
              </div>
              <button type="submit" class="btn-primary">Send reset link</button>
            </form>
          </section>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p>&copy; <span id="year-placeholder">2026</span> Reward Committee</p>
    </footer>

    <script type="module" src="assets/js/auth.js"></script>
    <script type="module">
      import { initAuthListener } from "./assets/js/auth.js";
      initAuthListener();
    </script>
  </body>
</html>
